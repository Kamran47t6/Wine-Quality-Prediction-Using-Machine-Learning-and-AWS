<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="Wine Quality Prediction AI" />
        <meta name="author" content="AI Developer" />
        <title>Wine Quality Prediction</title>
        <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />
        <!-- Font Awesome icons -->
        <script src="https://use.fontawesome.com/releases/v6.0.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Google Fonts -->
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <!-- Modern Theme CSS -->
        <link href="static/css/modern-theme.css?v=2.0" rel="stylesheet" />
    </head>
    <body>
        <!-- Navigation -->
        <nav class="navbar navbar-expand-lg" id="mainNav">
            <div class="container px-4 px-lg-5">
                <a class="navbar-brand" href="/">🍷 WinePredict AI</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav ms-auto py-4 py-lg-0"></ul>
                </div>
            </div>
        </nav>

        <!-- Page Header -->
        <header class="masthead" style="background-image: url('static/assets/img/wine.jpg')">
            <div class="container position-relative px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7">
                        <div class="site-heading">
                            <h1>Wine Quality Prediction</h1>
                            <span class="subheading">Predict Wine Quality Using Advanced Machine Learning</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="form-container">
            <div class="form-v9-content">
                <form class="form-detail" action="/predict" method="post">
                    <h2>🍇 Quality Analysis Form</h2>
                    
                    <!-- Row 1: Acidity Metrics -->
                    <div class="form-row-total">
                        <div class="form-row">
                            <label for="fixed_acidity">Fixed Acidity</label>
                            <input type="text" name="fixed_acidity" id="fixed_acidity" class="input-text" placeholder="0.0 - 16.0" required>
                        </div>
                        <div class="form-row">
                            <label for="volatile_acidity">Volatile Acidity</label>
                            <input type="text" name="volatile_acidity" id="volatile_acidity" class="input-text" placeholder="0.0 - 2.0" required>
                        </div>
                    </div>

                    <!-- Row 2: Acid & Sugar -->
                    <div class="form-row-total">
                        <div class="form-row">
                            <label for="citric_acid">Citric Acid</label>
                            <input type="text" name="citric_acid" id="citric_acid" class="input-text" placeholder="0.0 - 1.5" required>
                        </div>
                        <div class="form-row">
                            <label for="residual_sugar">Residual Sugar</label>
                            <input type="text" name="residual_sugar" id="residual_sugar" class="input-text" placeholder="0.0 - 65.0" required>
                        </div>
                    </div>

                    <!-- Row 3: Chlorides & Sulfur Dioxide -->
                    <div class="form-row-total">
                        <div class="form-row">
                            <label for="chlorides">Chlorides</label>
                            <input type="text" name="chlorides" id="chlorides" class="input-text" placeholder="0.0 - 1.0" required>
                        </div>
                        <div class="form-row">
                            <label for="free_sulfur_dioxide">Free Sulfur Dioxide</label>
                            <input type="text" name="free_sulfur_dioxide" id="free_sulfur_dioxide" class="input-text" placeholder="1 - 72 mg/dm³" required>
                        </div>
                    </div>

                    <!-- Row 4: Total Sulfur & Density -->
                    <div class="form-row-total">
                        <div class="form-row">
                            <label for="total_sulfur_dioxide">Total Sulfur Dioxide</label>
                            <input type="text" name="total_sulfur_dioxide" id="total_sulfur_dioxide" class="input-text" placeholder="6 - 289 mg/dm³" required>
                        </div>
                        <div class="form-row">
                            <label for="density">Density</label>
                            <input type="text" name="density" id="density" class="input-text" placeholder="0.990 - 1.040 g/cm³" required>
                        </div>
                    </div>

                    <!-- Row 5: pH & Sulphates -->
                    <div class="form-row-total">
                        <div class="form-row">
                            <label for="pH">pH Level</label>
                            <input type="text" name="pH" id="pH" class="input-text" placeholder="2.7 - 4.0" required>
                        </div>
                        <div class="form-row">
                            <label for="sulphates">Sulphates</label>
                            <input type="text" name="sulphates" id="sulphates" class="input-text" placeholder="0.3 - 2.0 g/dm³" required>
                        </div>
                    </div>

                    <!-- Row 6: Alcohol Content -->
                    <div class="form-row-total">
                        <div class="form-row">
                            <label for="alcohol">Alcohol Content</label>
                            <input type="text" name="alcohol" id="alcohol" class="input-text" placeholder="8.0 - 15.0 %vol" required>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="form-row-last">
                        <input type="submit" name="register" class="register" value="🚀 Predict Quality">
                    </div>
                </form>
            </div>
        </div>

        <!-- Footer -->
        <footer class="border-top">
            <div class="container px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7">
                        <ul class="list-inline text-center">
                            <li class="list-inline-item">
                                <a href="https://www.linkedin.com/in/muhammad-kamran-4a9539257/" target="_blank" title="LinkedIn Profile">
                                    <span class="fa-stack fa-lg">
                                        <i class="fas fa-circle fa-stack-2x"></i>
                                        <i class="fab fa-linkedin fa-stack-1x fa-inverse"></i>
                                    </span>
                                </a>
                            </li>
                            <li class="list-inline-item">
                                <a href="https://github.com/Kamran47t6" target="_blank" title="GitHub Profile">
                                    <span class="fa-stack fa-lg">
                                        <i class="fas fa-circle fa-stack-2x"></i>
                                        <i class="fab fa-github fa-stack-1x fa-inverse"></i>
                                    </span>
                                </a>
                            </li>
                        </ul>
                        <div class="small text-center text-muted fst-italic" style="margin-top: 1.5rem;">
                            <p>Wine Quality Prediction using Machine Learning | AI Model v1.0</p>
                            <p>© 2026 All Rights Reserved</p>
                        </div>
                    </div>
                </div>
            </div>
        </footer>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
